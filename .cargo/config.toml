# ============================================================
# Windows 7 兼容性配置
# ============================================================
#
# 问题: 程序在 Windows 7 上启动时报错:
#   "无法定位程序输入点 GetSystemTimePreciseAsFileTime
#    于动态链接库 kernel32.dll 上"
#
# 修复策略（三层防护）:
#   [源码层] src/cli.rs → chrono crate 替代 time crate
#     chrono 仅使用 GetSystemTimeAsFileTime (Win7+ 存在)
#   [PE层]  build_and_verify.bat [3/4] → fix_win7_import.py
#     修改编译后 PE 的 ILT，将 stdlib 残留的
#     GetSystemTimePreciseAsFileTime 重定向为
#     GetSystemTimeAsFileTime（与 Rust 版本无关，1.78+ 均适用）
#   [PE头]  /SUBSYSTEM:CONSOLE,6.01 → 标记最低 OS 为 Win7
#
# 关于 Rust 工具链版本:
#   当前使用 Rust 1.96.0，stdlib 会在 SystemTime::now() 中
#   导入 GetSystemTimePreciseAsFileTime。fix_win7_import.py
#   的 PE 后处理可处理任意 Rust 版本生成的二进制——它直接
#   修改导入表，不依赖编译器行为。
#   如需额外保障，可安装 Rust 1.77 工具链:
#     rustup toolchain install 1.77.0
#     cargo +1.77.0 build --release
#   (1.77 的 std 不导入 GetSystemTimePreciseAsFileTime)
# ============================================================

[env]
# 告知 windows/windows-sys crate 生成 Win7 (6.1) 兼容绑定
WINDOWS_TARGET_PLATFORM_MINVERSION = "0x0601"

[target.x86_64-pc-windows-msvc]
rustflags = [
    "-C", "link-arg=/SUBSYSTEM:CONSOLE,6.01",
]

[target.i686-pc-windows-msvc]
rustflags = [
    "-C", "link-arg=/SUBSYSTEM:CONSOLE,6.01",
]
